<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket King Live - Pro Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #0f172a; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .container { width: 100%; max-width: 900px; padding: 10px; }
        .video-js { width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .status { color: #4ade80; text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" data-setup='{}'>
        <source src="https://ungr.moosewala.workers.dev/" type="application/x-mpegURL">
        <p class="vjs-no-js">Video dekhne ke liye JavaScript enable karein.</p>
    </video>
    <div class="status">● Live Streaming via Cloudflare Proxy</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    var player = videojs('my-video', {
        autoplay: true,
        muted: false,
        fluid: true,
        playbackRates: [0.5, 1, 1.5, 2],
        controlBar: {
            skipButtons: { forward: 10, backward: 10 }
        }
    });

    // Auto-retry agar stream ruk jaye
    player.on('error', function() {
        console.log("Stream ruk gayi, refresh ho raha hai...");
        setTimeout(function() { player.src({ src: 'https://ungr.moosewala.workers.dev/', type: 'application/x-mpegURL' }); }, 3000);
    });
</script>

</body>
</html>
