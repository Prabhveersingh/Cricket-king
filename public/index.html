<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket King Pro - High Quality</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@silvermine/videojs-quality-selector/dist/quality-selector.css" rel="stylesheet">
    <style>
        body { background-color: #020617; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .container { width: 100%; max-width: 1000px; padding: 10px; }
        .video-js { width: 100%; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .status { color: #60a5fa; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <video id="cricket-player" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto">
        <source src="https://ungr.moosewala.workers.dev/" type="application/x-mpegURL">
    </video>
    <div class="status">HD Streaming Enabled | 1080p Support</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/@silvermine/videojs-quality-selector/dist/js/silvermine-videojs-quality-selector.min.js"></script>

<script>
    var player = videojs('cricket-player', {
        autoplay: true,
        muted: false,
        fluid: true,
        responsive: true,
        controlBar: {
            children: [
                'playToggle',
                'volumePanel',
                'currentTimeDisplay',
                'timeDivider',
                'durationDisplay',
                'progressControl',
                'liveDisplay',
                'qualitySelector', // Yeh line quality button add karegi
                'fullscreenToggle',
            ],
        },
    });

    // Error Handling
    player.on('error', function() {
        setTimeout(function() {
            player.src({ src: 'https://ungr.moosewala.workers.dev/', type: 'application/x-mpegURL' });
        }, 5000);
    });
</script>
</body>
</html>
